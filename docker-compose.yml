services:
  openclaw-gateway:
    image: local/openclaw-gateway:${OPENCLAW_VERSION:-2026.6.10}
    build:
      context: .
      dockerfile: Dockerfile.openclaw-gateway
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-2026.6.10}
        NODE_IMAGE: ${NODE_IMAGE:-node:24-bookworm-slim}
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_MODE: "local"
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama-local}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENCLAW_GATEWAY_BIND: "lan"
      OPENCLAW_HTTP_ENDPOINTS_CHATCOMPLETIONS_ENABLED: "true"
      OPENCLAW_HTTP_ENDPOINTS_MODELS_ENABLED: "true"
      BROWSER_CDP_URL: "http://browser:9222"
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ./openclaw:/home/node/.openclaw
    command:
      [
        "sh",
        "-lc",
        "chmod 700 /home/node/.openclaw && exec openclaw gateway"
      ]
    depends_on:
      browser:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  open-webui:
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:v0.9.6}
    ports:
      - "127.0.0.1:${OPEN_WEBUI_PORT:-8080}:8080"
    environment:
      OPENAI_API_BASE_URL: http://openclaw-gateway:18789/v1
      OPENAI_API_KEY: ${OPENCLAW_GATEWAY_TOKEN}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      ENABLE_OPENAI_API: "true"
      WEBUI_AUTH: "true"
      WEBUI_NAME: OpenClaw-WebUI
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD}
      WEBUI_ADMIN_NAME: ${WEBUI_ADMIN_NAME:-Admin}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_SIGNUP: "false"
      ENABLE_PASSWORD_VALIDATION: "true"
      CORS_ALLOW_ORIGIN: "http://localhost:${OPEN_WEBUI_PORT:-8080};http://127.0.0.1:${OPEN_WEBUI_PORT:-8080}"
      JWT_EXPIRES_IN: ${WEBUI_JWT_EXPIRES_IN:-24h}
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./openwebui-data:/app/backend/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  browser:
    image: ${BROWSER_IMAGE:-coollabsio/openclaw-browser:0.3.0}
    environment:
      PUID: ${LOCAL_UID:-1000}
      PGID: ${LOCAL_GID:-1000}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ./browser-config:/config
    shm_size: 2g
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
