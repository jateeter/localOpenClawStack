services:
  openclaw-gateway:
    image: local/openclaw-gateway:${OPENCLAW_VERSION:-2026.6.8}
    build:
      context: .
      dockerfile: Dockerfile.openclaw-gateway
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-2026.6.8}
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_MODE: "local"
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "true"
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENCLAW_GATEWAY_BIND: "lan"
      OPENCLAW_HTTP_ENDPOINTS_CHATCOMPLETIONS_ENABLED: "true"
      OPENCLAW_HTTP_ENDPOINTS_MODELS_ENABLED: "true"
      BROWSER_CDP_URL: "http://browser:9222"
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ./openclaw:/home/node/.openclaw
    depends_on:
      browser:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "${OPEN_WEBUI_PORT:-8080}:8080"
    environment:
      OPENAI_API_BASE_URL: http://openclaw-gateway:18789/v1
      OPENAI_API_KEY: ${OPENCLAW_GATEWAY_TOKEN}
      ENABLE_OPENAI_API: "true"
      WEBUI_AUTH: "true"
      WEBUI_NAME: OpenClaw-WebUI
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    volumes:
      - ./openwebui-data:/app/backend/data
    restart: unless-stopped

  browser:
    image: coollabsio/openclaw-browser:latest
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ./browser-config:/config
    shm_size: 2g
    restart: unless-stopped
